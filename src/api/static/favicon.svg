<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d0ff"/>
      <stop offset="100%" stop-color="#3d6aff" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gold" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8cfa0"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="mast" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0d4ff"/>
      <stop offset="100%" stop-color="#3d6aff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="hull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d6aff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#6b96ff"/>
      <stop offset="100%" stop-color="#3d6aff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Mast -->
  <line x1="32" y1="8" x2="32" y2="48" stroke="url(#mast)" stroke-width="2" stroke-linecap="round"/>
  <!-- Main sail -->
  <path d="M32,10 C48,22 50,36 46,44 C42,46 36,40 32,38 Z" fill="url(#sail)" opacity="0.9"/>
  <!-- Fore sail -->
  <path d="M32,14 C20,24 18,36 20,42 C22,44 28,40 32,38 Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Hull -->
  <path d="M18,48 Q32,56 46,48 L44,52 Q32,58 20,52 Z" fill="none" stroke="url(#hull)" stroke-width="2" stroke-linecap="round"/>
  <!-- North star -->
  <polygon points="32,4 33,6 35,7 33,8 32,10 31,8 29,7 31,6" fill="#c8a96e" opacity="0.8"/>
</svg>
