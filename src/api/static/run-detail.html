<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vela — Run Detail</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/vela-design-system.css">
<script src="/static/vela-theme.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; flex-direction:column; background:var(--bg-primary); color:var(--text-primary); font-family:var(--font-body); }

  /* ── Nav ─────────────────────────────────────────── */
  .nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 var(--space-6); height:56px; background:var(--bg-secondary); border-bottom:1px solid var(--border-subtle); backdrop-filter:blur(16px); }
  .nav-logo { font-family:var(--font-display); font-weight:300; font-size:var(--text-xl); letter-spacing:0.22em; background:var(--gradient-heading); -webkit-background-clip:text; background-clip:text; color:transparent; text-decoration:none; transition:opacity var(--transition-fast); }
  .nav-logo:hover { opacity:0.8; }
  .nav-link { color:var(--text-muted); font-size:var(--text-sm); text-decoration:none; font-weight:300; transition:color 0.15s; }
  .nav-link:hover { color:var(--text-primary); }

  /* ── Main ────────────────────────────────────────── */
  .main { flex:1; padding:80px var(--space-6) var(--space-12); max-width:1200px; width:100%; margin:0 auto; }

  /* ── Breadcrumb ─────────────────────────────────── */
  .breadcrumb { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-5); font-size:var(--text-sm); font-weight:300; }
  .breadcrumb a { color:var(--accent-blue); text-decoration:none; }
  .breadcrumb a:hover { opacity:0.7; }
  .breadcrumb-sep { color:var(--text-muted); }
  .breadcrumb-current { color:var(--text-muted); }

  /* ── Run Header Card ────────────────────────────── */
  .run-header-card { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:var(--space-6); margin-bottom:var(--space-6); }
  .run-header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:var(--space-4); margin-bottom:var(--space-4); }
  .run-title { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:300; color:var(--text-heading); letter-spacing:0.03em; margin:0; }
  .run-subtitle { font-size:var(--text-sm); color:var(--text-muted); font-weight:300; margin-top:var(--space-1); }
  .run-subtitle code { font-family:var(--font-mono); font-size:var(--text-xs); background:var(--bg-accent); padding:2px 6px; border-radius:var(--radius-sm); }
  .run-meta-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:var(--space-3); }
  .meta-item { display:flex; flex-direction:column; gap:2px; }
  .meta-label { font-size:var(--text-xs); color:var(--text-muted); font-weight:500; letter-spacing:0.06em; text-transform:uppercase; }
  .meta-value { font-size:var(--text-sm); color:var(--text-primary); font-weight:300; }

  /* ── Badges ─────────────────────────────────────── */
  .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:500; letter-spacing:0.03em; white-space:nowrap; }
  .badge-dot { width:6px; height:6px; border-radius:var(--radius-full); flex-shrink:0; }
  .badge--active { background:rgba(107,150,255,0.12); color:var(--accent-blue); }
  .badge--active .badge-dot { background:var(--accent-blue); animation:pulse-dot 1.4s ease-in-out infinite; }
  .badge--paused { background:rgba(200,169,110,0.12); color:var(--accent-gold); }
  .badge--paused .badge-dot { background:var(--accent-gold); animation:pulse-dot 1.4s ease-in-out infinite; }
  .badge--completed { background:rgba(74,222,128,0.1); color:var(--accent-green); }
  .badge--completed .badge-dot { background:var(--accent-green); }
  .badge--cancelled { background:rgba(255,107,107,0.1); color:var(--accent-red); }
  .badge--cancelled .badge-dot { background:var(--accent-red); }
  .badge-lg { padding:5px 14px; font-size:var(--text-sm); }
  @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .type-badge { display:inline-block; padding:2px 8px; border-radius:var(--radius-sm); font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
  .type-badge--freeform { background:rgba(107,150,255,0.15); color:var(--accent-blue); }
  .type-badge--choice { background:rgba(200,169,110,0.15); color:var(--accent-gold); }
  .type-badge--confirm { background:rgba(74,222,128,0.12); color:var(--accent-green); }
  .type-badge--execute { background:rgba(255,107,107,0.12); color:var(--accent-red); }
  .type-badge--dialog { background:rgba(168,196,255,0.15); color:var(--text-accent); }
  .type-badge--workflow { background:rgba(200,169,110,0.1); color:var(--text-gold); }
  .type-badge--mcp_call { background:rgba(142,164,196,0.15); color:var(--text-secondary); }

  /* ── Section ────────────────────────────────────── */
  .section { margin-bottom:var(--space-6); }
  .section-title { font-family:var(--font-display); font-size:var(--text-lg); font-weight:400; color:var(--text-heading); letter-spacing:0.03em; margin-bottom:var(--space-4); padding-bottom:var(--space-2); border-bottom:1px solid var(--border-subtle); }

  /* ── DAG ────────────────────────────────────────── */
  .dag-container { position:relative; overflow-x:auto; padding:var(--space-4) 0; }
  .dag-canvas { position:relative; margin:0 auto; }
  .dag-svg { position:absolute; top:0; left:0; pointer-events:none; }
  .dag-node { position:absolute; width:220px; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); cursor:pointer; transition:all var(--transition-fast); overflow:hidden; }
  .dag-node:hover { border-color:var(--border-hover); background:var(--bg-card-hover); transform:translateY(-1px); }
  .dag-node--current { border-color:var(--accent-blue); box-shadow:0 0 0 1px var(--accent-blue), 0 0 20px rgba(107,150,255,0.12); }
  .dag-node--completed { opacity:0.75; }
  .dag-node--pending { opacity:0.35; }

  .dag-node-header { padding:10px 14px 8px; }
  .dag-node-name { font-size:var(--text-sm); font-weight:500; color:var(--text-heading); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dag-node-badges { display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap; }

  .dag-node-io { display:flex; border-top:1px solid var(--border-subtle); }
  .dag-io-col { flex:1; padding:6px 10px; font-size:10px; font-weight:400; }
  .dag-io-col + .dag-io-col { border-left:1px solid var(--border-subtle); }
  .dag-io-label { color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:500; margin-bottom:2px; }
  .dag-io-items { color:var(--text-secondary); line-height:1.5; }
  .dag-io-value { color:var(--accent-green); font-family:var(--font-mono); font-size:9px; }
  .dag-io-pending { color:var(--text-muted); font-style:italic; }

  /* ── Step Cards ─────────────────────────────────── */
  .step-list { display:flex; flex-direction:column; gap:var(--space-3); }

  .step-card { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); overflow:hidden; transition:border-color var(--transition-fast); }
  .step-card--current { border-color:var(--accent-blue); }
  .step-card--completed { opacity:0.85; }

  .step-card-header { display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:var(--space-3); padding:var(--space-3) var(--space-4); cursor:pointer; transition:background var(--transition-fast); }
  .step-card-header:hover { background:var(--bg-surface-hover); }
  .step-card-chevron { width:16px; height:16px; color:var(--text-muted); transition:transform var(--transition-fast); flex-shrink:0; }
  .step-card.open .step-card-chevron { transform:rotate(90deg); }
  .step-card-name { font-size:var(--text-sm); font-weight:500; color:var(--text-heading); }

  .step-card-body { display:none; padding:0; }
  .step-card.open .step-card-body { display:block; }

  /* IO Panels inside step card */
  .step-io-panels { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--border-subtle); }
  .step-io-panel { padding:var(--space-3) var(--space-4); }
  .step-io-panel + .step-io-panel { border-left:1px solid var(--border-subtle); }
  .step-io-panel-title { font-size:var(--text-xs); font-weight:500; color:var(--text-muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:var(--space-2); }
  .step-io-empty { font-size:var(--text-xs); color:var(--text-muted); font-style:italic; }

  .io-item { padding:3px 0; font-size:var(--text-xs); }
  .io-item-key { font-family:var(--font-mono); color:var(--accent-blue); font-weight:500; }
  .io-item-value { color:var(--text-secondary); font-weight:300; margin-left:var(--space-1); word-break:break-word; }
  .io-item-tag { color:var(--text-muted); font-weight:300; }

  /* Step detail sections */
  .step-details-section { padding:var(--space-3) var(--space-4); border-top:1px solid var(--border-subtle); }
  .step-details-section:empty { display:none; }

  .step-detail-row { display:flex; gap:var(--space-3); padding:var(--space-2) 0; border-bottom:1px solid rgba(107,150,255,0.04); }
  .step-detail-row:last-child { border-bottom:none; }
  .step-detail-label { width:100px; flex-shrink:0; font-size:var(--text-xs); font-weight:500; color:var(--text-muted); letter-spacing:0.04em; text-transform:uppercase; padding-top:2px; }
  .step-detail-value { flex:1; font-size:var(--text-sm); color:var(--text-secondary); font-weight:300; line-height:1.5; min-width:0; }
  .step-detail-value pre { margin:0; font-family:var(--font-mono); font-size:var(--text-xs); background:var(--bg-primary); padding:var(--space-2) var(--space-3); border-radius:var(--radius-sm); overflow-x:auto; white-space:pre-wrap; word-break:break-word; max-height:200px; }

  /* Sub-workflow link */
  .subwf-link { display:inline-flex; align-items:center; gap:var(--space-2); padding:6px 12px; background:var(--bg-accent); border:1px solid var(--border-subtle); border-radius:var(--radius-md); color:var(--accent-blue); text-decoration:none; font-size:var(--text-xs); font-weight:500; transition:all var(--transition-fast); }
  .subwf-link:hover { background:var(--bg-accent-hover); border-color:var(--border-hover); }
  .subwf-link svg { width:14px; height:14px; }

  /* ── Params ─────────────────────────────────────── */
  .params-grid { display:flex; flex-wrap:wrap; gap:var(--space-2); margin-top:var(--space-2); }
  .param-item { display:flex; flex-direction:column; gap:2px; padding:var(--space-2) var(--space-3); background:var(--bg-surface); border-radius:var(--radius-sm); min-width:180px; }
  .param-key { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-muted); font-weight:500; }
  .param-value { font-size:var(--text-sm); color:var(--text-primary); font-weight:300; word-break:break-word; }

  /* ── Application Params ─────────────────────────── */
  .app-params-row { display:flex; flex-wrap:wrap; gap:var(--space-2); margin-top:var(--space-3); }
  .app-param-pill {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 12px; border-radius:var(--radius-full);
    font-size:var(--text-xs); font-weight:500; letter-spacing:0.02em;
    background:rgba(180,180,180,0.08); color:var(--text-muted);
    border:1px solid rgba(180,180,180,0.15);
  }
  .app-param-pill--on {
    background:rgba(74,222,128,0.1); color:var(--accent-green);
    border-color:rgba(74,222,128,0.2);
  }

  /* ── State Data ─────────────────────────────────── */
  .state-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:var(--space-3); }
  .state-item { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:var(--space-3) var(--space-4); }
  .state-key { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--accent-blue); font-weight:500; margin-bottom:4px; }
  .state-value { font-size:var(--text-sm); color:var(--text-secondary); font-weight:300; word-break:break-word; white-space:pre-wrap; line-height:1.5; max-height:120px; overflow-y:auto; }

  /* ── Resources ──────────────────────────────────── */
  .resource-list { display:flex; flex-wrap:wrap; gap:var(--space-2); }
  .resource-tag { display:inline-flex; align-items:center; gap:var(--space-1); padding:4px 10px; background:var(--bg-accent); border-radius:var(--radius-full); font-size:var(--text-xs); color:var(--text-accent); font-weight:400; }

  /* ── Loading ────────────────────────────────────── */
  .loading-state { text-align:center; padding:var(--space-16) var(--space-6); }
  .spinner { display:inline-block; width:24px; height:24px; border:2px solid var(--border-subtle); border-top-color:var(--accent-blue); border-radius:var(--radius-full); animation:spin 0.7s linear infinite; margin-bottom:var(--space-3); }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Footer ─────────────────────────────────────── */
  .footer { text-align:center; padding:var(--space-8) var(--space-6); font-size:var(--text-xs); color:var(--text-muted); font-weight:300; letter-spacing:0.06em; border-top:1px solid var(--border-subtle); }

  @media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; } }
  @media (max-width:768px) {
    .step-io-panels { grid-template-columns:1fr; }
    .step-io-panel + .step-io-panel { border-left:none; border-top:1px solid var(--border-subtle); }
    .dag-node { width:170px; }
  }
  @media (max-width:640px) {
    .nav { padding:0 var(--space-4); }
    .main { padding:72px var(--space-4) var(--space-8); }
    .run-header-top { flex-direction:column; }
    .run-meta-grid { grid-template-columns:1fr 1fr; }
    .state-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">VELA</a>
    <div style="display:flex;align-items:center;gap:var(--space-3)">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/docs" class="nav-link">Docs</a>
    </div>
  </nav>

  <main class="main" id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);font-size:var(--text-sm);font-weight:300">Loading run details...</p>
    </div>
  </main>

  <footer class="footer">&copy; 2026 Vela</footer>

<script>
(function() {
  'use strict';

  function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
  function escAttr(s) { return String(s||'').replace(/[&"'<>]/g, function(c) { return {'&':'&amp;','"':'&quot;',"'":'&#39;','<':'&lt;','>':'&gt;'}[c]; }); }

  function fmtDate(d) { if (!d) return '-'; return new Date(d).toLocaleString(undefined, { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  function fmtRel(d) { if (!d) return ''; var diff = Date.now() - new Date(d); if (diff<60000) return 'just now'; if (diff<3600000) return Math.floor(diff/60000)+'m ago'; if (diff<86400000) return Math.floor(diff/3600000)+'h ago'; return Math.floor(diff/86400000)+'d ago'; }
  function fmtVal(v) { if (v===null||v===undefined) return '-'; if (typeof v==='object') return JSON.stringify(v,null,2); return String(v); }
  function truncate(s, n) { s = String(s||''); return s.length > n ? s.substring(0,n) + '...' : s; }

  var runId = window.location.pathname.split('/').pop();

  async function loadData() {
    try {
      var runRes = await fetch('/api/runs/' + encodeURIComponent(runId));
      if (!runRes.ok) throw new Error('Run not found');
      var runData = await runRes.json();
      var run = runData.run;
      var childRuns = runData.child_runs || [];

      var workflow = null;
      var wfRes = await fetch('/api/workflows/' + encodeURIComponent(run.workflow_id));
      if (wfRes.ok) { workflow = (await wfRes.json()).workflow; }

      render(run, workflow, childRuns);
    } catch (e) {
      document.getElementById('content').innerHTML =
        '<div class="breadcrumb"><a href="/dashboard">Dashboard</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">Error</span></div>' +
        '<div class="loading-state"><p style="color:var(--text-error);font-size:var(--text-sm)">Failed to load run: ' + esc(e.message) + '</p>' +
        '<a href="/dashboard" style="color:var(--accent-blue);font-size:var(--text-sm)">Back to Dashboard</a></div>';
    }
  }

  function render(run, workflow, childRuns) {
    var shortId = run.id.substring(0, 8);
    var wfName = workflow ? workflow.name : run.workflow_id;
    var moduleName = workflow ? (workflow.module || '') : '';
    var steps = workflow ? workflow.steps : [];
    var stateData = run.state_data || {};
    var params = run.params || {};
    var stepStatuses = computeStepStatuses(steps, run.current_step, stateData, run.status);

    // Map child runs by parent_step_id for sub-workflow linking
    var childByStep = {};
    childRuns.forEach(function(cr) { if (cr.parent_step_id) childByStep[cr.parent_step_id] = cr; });

    // Collect all capture keys -> step mapping
    var captureToStep = {};
    steps.forEach(function(s) { (s.capture||[]).forEach(function(c) { captureToStep[c.key] = s.id; }); });

    var html = '';

    // ── Breadcrumb ──
    html += '<div class="breadcrumb">' +
      '<a href="/dashboard">Dashboard</a><span class="breadcrumb-sep">/</span>';
    if (run.parent_run_id) {
      html += '<a href="/dashboard/runs/' + escAttr(run.parent_run_id) + '">Parent Run</a><span class="breadcrumb-sep">/</span>';
    }
    html += '<span class="breadcrumb-current">Run ' + esc(shortId) + '</span></div>';

    // ── Run Header ──
    var statusClass = 'badge--' + run.status;
    var statusLabel = run.status.charAt(0).toUpperCase() + run.status.slice(1);
    html += '<div class="run-header-card"><div class="run-header-top"><div>' +
      '<h1 class="run-title">' + esc(wfName) + '</h1>' +
      '<p class="run-subtitle">Run <code>' + esc(run.id) + '</code>' + (moduleName ? ' &middot; ' + esc(moduleName) : '') + '</p>' +
    '</div><span class="badge badge-lg ' + statusClass + '"><span class="badge-dot"></span>' + statusLabel + '</span></div>' +
    '<div class="run-meta-grid">' +
      '<div class="meta-item"><span class="meta-label">Started</span><span class="meta-value">' + fmtDate(run.started_at) + '</span></div>' +
      '<div class="meta-item"><span class="meta-label">Updated</span><span class="meta-value">' + fmtDate(run.updated_at) + ' (' + fmtRel(run.updated_at) + ')</span></div>' +
      '<div class="meta-item"><span class="meta-label">Completed</span><span class="meta-value">' + (run.completed_at ? fmtDate(run.completed_at) : '-') + '</span></div>' +
      '<div class="meta-item"><span class="meta-label">Current Step</span><span class="meta-value">' + esc(run.current_step || '-') + '</span></div>' +
    '</div>';

    // System-level application params — global, apply to every workflow without YAML declaration
    var SYSTEM_APP_PARAMS = {
      automation_mode: { label: 'Automation Mode', icon: '&#9889;' },
    };
    var paramKeys = Object.keys(params).filter(function(k) { return !SYSTEM_APP_PARAMS[k]; });
    if (paramKeys.length > 0) {
      html += '<div style="margin-top:var(--space-4)"><span class="meta-label">Parameters</span><div class="params-grid">';
      paramKeys.forEach(function(k) { html += '<div class="param-item"><span class="param-key">' + esc(k) + '</span><span class="param-value">' + esc(fmtVal(params[k])) + '</span></div>'; });
      html += '</div></div>';
    }

    var appParamsPresent = Object.keys(SYSTEM_APP_PARAMS).filter(function(k) { return params[k] != null; });
    if (appParamsPresent.length > 0) {
      html += '<div class="app-params-row">';
      appParamsPresent.forEach(function(k) {
        var def = SYSTEM_APP_PARAMS[k];
        var rawVal = params[k];
        var isOn = rawVal === true || rawVal === 'true' || rawVal === 1;
        var displayVal = String(rawVal);
        html += '<span class="app-param-pill' + (isOn ? ' app-param-pill--on' : '') + '">'
          + def.icon + ' ' + esc(def.label) + ': <strong>' + esc(displayVal) + '</strong></span>';
      });
      html += '</div>';
    }
    html += '</div>';

    // ── Step Flow DAG ──
    if (steps.length > 0) {
      html += '<div class="section"><h2 class="section-title">Step Flow</h2><div class="dag-container" id="dagContainer"></div></div>';
    }

    // ── Steps with Input / Output / Activity ──
    if (steps.length > 0) {
      html += '<div class="section"><h2 class="section-title">Steps</h2><div class="step-list">';
      steps.forEach(function(step, idx) {
        var sStatus = stepStatuses[step.id] || 'pending';
        var cardClass = sStatus === 'current' ? ' step-card--current' : sStatus === 'completed' ? ' step-card--completed' : '';

        var statusBadge = sStatus === 'completed'
          ? '<span class="badge badge--completed"><span class="badge-dot"></span>Done</span>'
          : sStatus === 'current'
          ? '<span class="badge badge--active"><span class="badge-dot"></span>Current</span>'
          : '<span class="badge" style="background:var(--bg-surface);color:var(--text-muted)"><span class="badge-dot" style="background:var(--text-muted)"></span>Pending</span>';

        html += '<div class="step-card' + cardClass + '" id="step-' + idx + '">' +
          '<div class="step-card-header" onclick="toggleStep(' + idx + ')">' +
            '<svg class="step-card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
            '<span class="step-card-name">' + esc(step.name || step.id) + '</span>' +
            '<span class="type-badge type-badge--' + step.type + '">' + esc(step.type) + '</span>' +
            statusBadge +
          '</div>';

        // ── IO Panels: Input | Output | Activity ──
        html += '<div class="step-card-body"><div class="step-io-panels">';

        // INPUT panel: depends_on + fetch
        html += '<div class="step-io-panel"><div class="step-io-panel-title">Input</div>';
        var hasInput = false;
        if (step.depends_on && step.depends_on.length > 0) {
          hasInput = true;
          step.depends_on.forEach(function(d) {
            d.fields.forEach(function(f) {
              var val = stateData[f];
              html += '<div class="io-item"><span class="io-item-key">' + esc(f) + '</span> <span class="io-item-tag">from ' + esc(d.step) + '</span>';
              if (val != null) html += '<div class="io-item-value">' + esc(truncate(fmtVal(val), 80)) + '</div>';
              html += '</div>';
            });
          });
        }
        if (step.fetch && step.fetch.length > 0) {
          hasInput = true;
          step.fetch.forEach(function(f) {
            html += '<div class="io-item"><span class="io-item-key">' + esc(f.key) + '</span> <span class="io-item-tag">fetch ' + esc(f.action) + '</span></div>';
          });
        }
        if (!hasInput) html += '<div class="step-io-empty">No dependencies</div>';
        html += '</div>';

        // OUTPUT panel: captures with values from state_data
        html += '<div class="step-io-panel"><div class="step-io-panel-title">Output</div>';
        if (step.capture && step.capture.length > 0) {
          step.capture.forEach(function(c) {
            var val = stateData[c.key];
            html += '<div class="io-item"><span class="io-item-key">' + esc(c.key) + '</span> <span class="io-item-tag">' + esc(c.type) + (c.required ? ', required' : '') + '</span>';
            if (val != null) {
              html += '<div class="io-item-value" style="color:var(--accent-green)">' + esc(truncate(fmtVal(val), 80)) + '</div>';
            } else {
              html += '<div class="io-item-value dag-io-pending">not captured yet</div>';
            }
            html += '</div>';
          });
        } else {
          html += '<div class="step-io-empty">No captures</div>';
        }
        html += '</div>';

        // ACTIVITY panel: status, type-specific info, sub-workflow link
        html += '<div class="step-io-panel"><div class="step-io-panel-title">Activity</div>';
        html += '<div class="io-item">' + statusBadge + '</div>';

        if (step.type === 'choice' && step.options && step.options.length > 0) {
          html += '<div class="io-item" style="margin-top:4px"><span class="io-item-tag">' + step.options.length + ' options</span></div>';
        }
        if (step.type === 'dialog' && step.phases && step.phases.length > 0) {
          html += '<div class="io-item" style="margin-top:4px"><span class="io-item-tag">' + step.phases.length + ' phases</span></div>';
        }
        if (step.tools && step.tools.length > 0) {
          html += '<div class="io-item" style="margin-top:4px"><span class="io-item-tag">' + step.tools.length + ' tools</span></div>';
        }

        // Sub-workflow link
        if (step.type === 'workflow') {
          var child = childByStep[step.id];
          if (child) {
            html += '<div style="margin-top:8px">' +
              '<a class="subwf-link" href="/dashboard/runs/' + escAttr(child.id) + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
                'Sub-Run ' + esc(child.id.substring(0,8)) +
                ' <span class="badge badge--' + child.status + '" style="font-size:9px;padding:1px 6px"><span class="badge-dot"></span>' + esc(child.status) + '</span>' +
              '</a></div>';
          } else if (step.workflow_ref) {
            html += '<div class="io-item" style="margin-top:4px"><span class="io-item-tag">ref: ' + esc(step.workflow_ref) + '</span></div>';
          }
        }
        html += '</div>';

        html += '</div>'; // step-io-panels

        // ── Expandable details section ──
        html += '<div class="step-details-section">';

        if (step.prompt) {
          html += '<div class="step-detail-row"><span class="step-detail-label">Prompt</span><div class="step-detail-value"><pre>' + esc(step.prompt) + '</pre></div></div>';
        }
        if (step.type === 'execute' && step.instructions) {
          html += '<div class="step-detail-row"><span class="step-detail-label">Instructions</span><div class="step-detail-value"><pre>' + esc(step.instructions) + '</pre></div></div>';
        }
        if (step.type === 'dialog') {
          if (step.mode) html += '<div class="step-detail-row"><span class="step-detail-label">Mode</span><div class="step-detail-value">' + esc(step.mode) + '</div></div>';
          if (step.goal) html += '<div class="step-detail-row"><span class="step-detail-label">Goal</span><div class="step-detail-value">' + esc(step.goal) + '</div></div>';
          if (step.guidelines && step.guidelines.length) html += '<div class="step-detail-row"><span class="step-detail-label">Guidelines</span><div class="step-detail-value">' + step.guidelines.map(function(g){return esc(g);}).join('<br>') + '</div></div>';
          if (step.phases && step.phases.length) {
            html += '<div class="step-detail-row"><span class="step-detail-label">Phases</span><div class="step-detail-value">';
            step.phases.forEach(function(p) { html += '<div style="margin-bottom:4px"><strong>' + esc(p.name||p.id) + '</strong>: ' + esc(p.guideline) + '</div>'; });
            html += '</div></div>';
          }
        }
        if (step.type === 'choice' && step.options && step.options.length) {
          html += '<div class="step-detail-row"><span class="step-detail-label">Options</span><div class="step-detail-value">';
          step.options.forEach(function(o) {
            html += '<div>' + esc(o.key) + ': ' + esc(o.label) + (o.description ? ' — ' + esc(o.description) : '') + (o.next ? ' &rarr; ' + esc(o.next) : '') + '</div>';
          });
          html += '</div></div>';
        }
        if (step.type === 'mcp_call') {
          if (step.mcp_tool) html += '<div class="step-detail-row"><span class="step-detail-label">MCP Tool</span><div class="step-detail-value"><code>' + esc(step.mcp_tool) + '</code></div></div>';
          if (step.mcp_source) html += '<div class="step-detail-row"><span class="step-detail-label">MCP Source</span><div class="step-detail-value">' + esc(step.mcp_source) + '</div></div>';
        }
        if (step.resources && step.resources.length) {
          html += '<div class="step-detail-row"><span class="step-detail-label">Resources</span><div class="step-detail-value"><div class="resource-list">';
          step.resources.forEach(function(r) { html += '<span class="resource-tag">' + esc(r.ref) + '</span>'; });
          html += '</div></div></div>';
        }
        if (step.on_error) {
          var oe = step.on_error;
          var parts = [];
          if (oe.retry) parts.push('retry: ' + oe.retry);
          if (oe.fallback) parts.push('fallback: ' + oe.fallback);
          if (oe.abort) parts.push('abort');
          if (oe.message) parts.push('msg: ' + oe.message);
          if (parts.length) html += '<div class="step-detail-row"><span class="step-detail-label">On Error</span><div class="step-detail-value">' + esc(parts.join(', ')) + '</div></div>';
        }

        html += '</div>'; // step-details-section
        html += '</div></div>'; // step-card-body, step-card
      });
      html += '</div></div>'; // step-list, section
    }

    // ── Resources ──
    var allResources = [];
    if (workflow && workflow.resources && workflow.resources.length) {
      workflow.resources.forEach(function(r) { allResources.push({ ref:r.ref, scope:'workflow' }); });
    }
    if (allResources.length > 0) {
      html += '<div class="section"><h2 class="section-title">Workflow Resources</h2><div class="resource-list">';
      allResources.forEach(function(r) { html += '<span class="resource-tag">' + esc(r.ref) + '</span>'; });
      html += '</div></div>';
    }

    // ── State Data ──
    var stateKeys = Object.keys(stateData);
    if (stateKeys.length > 0) {
      html += '<div class="section"><h2 class="section-title">State Data</h2><div class="state-grid">';
      stateKeys.forEach(function(k) {
        var fromStep = captureToStep[k] || '';
        html += '<div class="state-item"><div class="state-key">' + esc(k) + (fromStep ? ' <span style="font-weight:300;color:var(--text-muted)">' + esc(fromStep) + '</span>' : '') + '</div><div class="state-value">' + esc(fmtVal(stateData[k])) + '</div></div>';
      });
      html += '</div></div>';
    }

    document.getElementById('content').innerHTML = html;
    if (steps.length > 0) setTimeout(function() { renderDag(steps, stepStatuses, stateData, childByStep); }, 0);
  }

  function computeStepStatuses(steps, currentStep, stateData, runStatus) {
    var s = {};
    if (!steps || !steps.length) return s;
    if (runStatus === 'completed') { steps.forEach(function(st) { s[st.id] = 'completed'; }); return s; }
    var found = false;
    steps.forEach(function(st) {
      if (st.id === currentStep) { s[st.id] = 'current'; found = true; }
      else if (!found) s[st.id] = 'completed';
      else s[st.id] = 'pending';
    });
    if (!found && !currentStep) {
      steps.forEach(function(st) {
        var has = st.capture && st.capture.some(function(c) { return stateData[c.key] != null; });
        s[st.id] = has ? 'completed' : 'pending';
      });
    }
    return s;
  }

  // ── DAG Rendering ──
  function renderDag(steps, stepStatuses, stateData, childByStep) {
    var container = document.getElementById('dagContainer');
    if (!container) return;

    var stepMap = {};
    steps.forEach(function(s, i) { stepMap[s.id] = { step:s, index:i }; });

    // Build execution-flow targets: next + options[].next (not depends_on)
    var stepIndex = {};
    steps.forEach(function(s, i) { stepIndex[s.id] = i; });
    var nextTargets = {};
    steps.forEach(function(s, i) {
      var targets = [];
      if (s.next) targets.push(s.next);
      if (s.options) s.options.forEach(function(o) { if (o.next) targets.push(o.next); });
      // Implicit sequential fallthrough when no explicit next is defined
      if (targets.length === 0 && i < steps.length - 1) targets.push(steps[i + 1].id);
      nextTargets[s.id] = targets;
    });

    // Topological layer assignment based on execution flow (next / options[].next)
    var layers = {};
    steps.forEach(function(s, i) { layers[s.id] = i; }); // seed with array order
    for (var pass = 0; pass < steps.length; pass++) {    // relax forward edges
      steps.forEach(function(s) {
        nextTargets[s.id].forEach(function(t) {
          if (stepIndex[t] > stepIndex[s.id] && layers[t] <= layers[s.id]) {
            layers[t] = layers[s.id] + 1;
          }
        });
      });
    }

    var layerGroups = {}, maxLayer = 0;
    steps.forEach(function(s) {
      var l = layers[s.id];
      if (!layerGroups[l]) layerGroups[l] = [];
      layerGroups[l].push(s);
      if (l > maxLayer) maxLayer = l;
    });

    var nodeW = 220, nodeH = 80, gapX = 50, gapY = 24, padX = 20, padY = 16;
    var positions = {}, totalW = 0, totalH = 0;

    for (var l = 0; l <= maxLayer; l++) {
      var group = layerGroups[l] || [];
      var x = padX + l * (nodeW + gapX);
      group.forEach(function(s, i) {
        var y = padY + i * (nodeH + gapY);
        positions[s.id] = { x:x, y:y };
        if (x + nodeW + padX > totalW) totalW = x + nodeW + padX;
        if (y + nodeH + padY > totalH) totalH = y + nodeH + padY;
      });
    }

    var nodesHtml = '';
    steps.forEach(function(s) {
      var pos = positions[s.id];
      var st = stepStatuses[s.id];
      var cls = st === 'current' ? ' dag-node--current' : st === 'completed' ? ' dag-node--completed' : ' dag-node--pending';

      var inputCount = (s.depends_on ? s.depends_on.reduce(function(n,d){return n+d.fields.length;},0) : 0) + (s.fetch ? s.fetch.length : 0);
      var outputCount = s.capture ? s.capture.length : 0;
      var capturedCount = s.capture ? s.capture.filter(function(c){return stateData[c.key]!=null;}).length : 0;

      nodesHtml += '<div class="dag-node' + cls + '" style="left:' + pos.x + 'px;top:' + pos.y + 'px;width:' + nodeW + 'px" onclick="toggleStep(' + stepMap[s.id].index + ')" title="' + escAttr(s.id) + '">' +
        '<div class="dag-node-header">' +
          '<div class="dag-node-name">' + esc(s.name || s.id) + '</div>' +
          '<div class="dag-node-badges"><span class="type-badge type-badge--' + s.type + '">' + esc(s.type) + '</span></div>' +
        '</div>' +
        '<div class="dag-node-io">' +
          '<div class="dag-io-col"><div class="dag-io-label">In</div><div class="dag-io-items">' + (inputCount > 0 ? inputCount + ' fields' : '-') + '</div></div>' +
          '<div class="dag-io-col"><div class="dag-io-label">Out</div><div class="dag-io-items">' + (outputCount > 0 ? '<span' + (capturedCount > 0 ? ' class="dag-io-value"' : '') + '>' + capturedCount + '/' + outputCount + '</span>' : '-') + '</div></div>' +
        '</div>' +
      '</div>';
    });

    // SVG arrows: execution flow (next / options[].next), forward edges only
    // Choice-step branches use gold; regular next edges use blue
    var svgPaths = '';
    steps.forEach(function(s) {
      var isChoice = s.type === 'choice';
      nextTargets[s.id].forEach(function(t) {
        var from = positions[s.id], to = positions[t];
        if (!from || !to) return;
        if (layers[t] <= layers[s.id]) return; // skip back-edges (loops)
        var x1 = from.x + nodeW, y1 = from.y + nodeH/2, x2 = to.x, y2 = to.y + nodeH/2;
        var cx = (x1+x2)/2;
        var stroke = isChoice ? 'rgba(200,169,110,0.5)' : 'rgba(107,150,255,0.4)';
        var fill   = isChoice ? 'rgba(200,169,110,0.6)' : 'rgba(107,150,255,0.5)';
        svgPaths += '<path d="M'+x1+' '+y1+' C '+cx+' '+y1+', '+cx+' '+y2+', '+x2+' '+y2+'" fill="none" stroke="'+stroke+'" stroke-width="1.5"/>' +
          '<polygon points="'+(x2-6)+','+(y2-4)+' '+x2+','+y2+' '+(x2-6)+','+(y2+4)+'" fill="'+fill+'"/>';
      });
    });

    container.innerHTML = '<div class="dag-canvas" style="width:'+totalW+'px;height:'+totalH+'px;position:relative">' +
      '<svg class="dag-svg" width="'+totalW+'" height="'+totalH+'">'+svgPaths+'</svg>' + nodesHtml + '</div>';
  }

  window.toggleStep = function(idx) {
    var el = document.getElementById('step-' + idx);
    if (el) { el.classList.toggle('open'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  };

  loadData();
})();
</script>
</body>
</html>
