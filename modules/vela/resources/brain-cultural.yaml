  # Kulturelle Brainstorming-Techniken

  Vier Techniken, die kulturelle Vielfalt als Inspirationsquelle nutzen. Innovation entsteht oft an den Schnittstellen verschiedener Kulturen und Denktraditionen.

  ## Wann einsetzen

  - Wenn Lösungen für diverse Zielgruppen entwickelt werden
  - Wenn westlich-analytisches Denken allein nicht weiterführt
  - Wenn menschzentrierte, transformative Erfahrungen gestaltet werden sollen
  - Wenn tiefere Bedeutungsebenen eines Problems erschlossen werden müssen

  ### Indigenous Wisdom

  Beziehe traditionelle Wissenssysteme und indigene Ansätze ein, die vom modernen Denken übersehen werden.

  **Anleitung:**
  1. Frage: Welche kulturellen Problemlösungsansätze existieren weltweit?
  2. Recherchiere wie verschiedene Kulturen ähnliche Herausforderungen gelöst haben
  3. Identifiziere Prinzipien, die über Jahrtausende Bestand hatten
  4. Integriere diese zeitlosen Prinzipien in deinen modernen Lösungsansatz

  **Tipp:** Achte besonders auf Ansätze, die Generationendenken und Langzeitperspektiven einbeziehen — oft fehlt genau das in modernen Lösungen.

  ### Fusion Cuisine

  Mische kulturelle Ansätze und Perspektiven wie Fusionsküche. Innovation durch kulturelle Kreuzbestäubung.

  **Anleitung:**
  1. Wähle zwei oder mehr kulturelle Perspektiven auf dein Problem
  2. Frage: Was passiert wenn Kultur A auf Kultur B trifft?
  3. Kombiniere die Stärken beider Ansätze zu etwas Neuem
  4. Teste ob die Fusion mehr ist als die Summe ihrer Teile

  **Tipp:** Die besten Fusionen entstehen aus respektvollem Verständnis beider Kulturen — oberflächliches Mischen führt selten zu echten Innovationen.

  ### Ritual Innovation

  Wende Ritual-Design-Prinzipien an für transformative Erfahrungen und Lösungen. Nutze anthropologische Einsichten für menschzentriertes Design.

  **Anleitung:**
  1. Analysiere bestehende Rituale rund um dein Problemfeld
  2. Identifiziere die psychologischen Funktionen dieser Rituale
  3. Gestalte neue Rituale oder Prozesse die diese Funktionen erfüllen
  4. Integriere Übergaenge, Symbole und gemeinsame Erfahrungen

  **Tipp:** Jeder gute Onboarding-Prozess ist im Grunde ein Übergangsritual. Denke an Schwellen, Transformation und Neuanfang.

  ### Mythic Frameworks

  Nutze Mythen und archetypische Geschichten als Frameworks für Problemverständnis. Zapfe das kollektive Unbewusste an.

  **Anleitung:**
  1. Frage: Welcher Mythos spiegelt unser Problem wider?
  2. Identifiziere die Archetypen in deiner Situation (Held, Mentor, Schatten)
  3. Folge der mythischen Struktur — welche Phase durchläufst du gerade?
  4. Nutze den Mythos als Navigationskarte für den Lösungsweg

  **Tipp:** Campbells Heldenreise ist nur ein Framework. Probiere auch Trickster-Mythen, Schöpfungsgeschichten oder Transformationsmythen als Denkmodelle.
