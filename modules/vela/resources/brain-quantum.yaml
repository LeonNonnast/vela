  # Quantendenk-Brainstorming-Techniken

  Drei Techniken, die Metaphern aus der Quantenphysik nutzen, um festgefahrenes Denken aufzubrechen. Quantenmechanik als Denkwerkzeug für kreative Problemlösung.

  ## Wann einsetzen

  - Wenn binäres Entweder-Oder-Denken die Kreativität blockiert
  - Wenn versteckte Zusammenhänge zwischen Problemen vermutet werden
  - Wenn zu frühes Festlegen auf eine Lösung vermieden werden soll
  - Wenn das Team bereit ist, mit ungewöhnlichen Denkmodellen zu arbeiten

  ### Observer Effect

  Erkenne wie Beobachtung und Messung Lösungen verändert. Hinterfrage den Einfluss deiner Perspektive auf das Ergebnis.

  **Anleitung:**
  1. Beschreibe dein Problem aus deiner aktuellen Perspektive
  2. Frage: Wie beeinflusst unsere Beobachtung das Ergebnis?
  3. Wechsle bewusst die Messperspektive — was passiert wenn wir anders messen?
  4. Dokumentiere wie sich das Problem mit jeder neuen Perspektive verändert

  **Tipp:** Lade Personen mit völlig anderen Hintergründen ein, das Problem zu beschreiben. Jeder Beobachter "kollabiert" das Problem anders.

  ### Entanglement Thinking

  Erkunde verborgene Verbindungen zwischen scheinbar unabhängigen Lösungselementen. Welche entfernten Teile beeinflussen sich gegenseitig?

  **Anleitung:**
  1. Liste alle Elemente deines Problems auf, auch scheinbar irrelevante
  2. Suche nach versteckten Verbindungen zwischen weit entfernten Elementen
  3. Teste: Wenn ich Element A ändere, was passiert mit Element Z?
  4. Nutze diese Verschränkungen für überraschende Lösungskombinationen

  **Tipp:** Die stärksten Innovationen entstehen oft durch Verbindungen, die niemand erwartet. Je weiter die Elemente auseinander liegen, desto interessanter die Verschränkung.

  ### Superposition Collapse

  Halte mehrere potenzielle Lösungen gleichzeitig, bis Constraints die optimale erzwingen. Widersetze dich dem Drang zur frühen Festlegung.

  **Anleitung:**
  1. Entwickle mindestens 5 gleichwertige Lösungsansätze
  2. Halte alle Lösungen bewusst offen — bewerte noch nicht
  3. Führe schrittweise reale Constraints ein (Budget, Zeit, Ressourcen)
  4. Beobachte welche Lösung emergiert wenn die Constraints wirken

  **Tipp:** Schreibe jede Lösung auf eine separate Karte. Erst wenn alle Constraints definiert sind, drehe die Karten um und prüfe welche bestehen.
