  # Kollaborative Brainstorming-Techniken

  ## Wann einsetzen

  Kollaborative Techniken eignen sich besonders für Teams, die gemeinsam Ideen entwickeln
  und aufeinander aufbauen wollen. Nutze diese Methoden, wenn du die kollektive Intelligenz
  einer Gruppe aktivieren möchtest, wenn einzelne Teilnehmer sich zurückhalten oder wenn
  bestehende Ideen weiterentwickelt werden sollen. Ideal für Workshops, Teamretros und
  kreative Planungsphasen.

  ### Yes And Building

  **Anleitung:**
  1. Ein Teilnehmer bringt eine Idee ein, egal wie ungewöhnlich sie klingt.
  2. Der nächste Teilnehmer beginnt mit "Ja, und..." und fügt einen neuen Aspekt hinzu.
  3. Jede Ergänzung wird als Sprungbrett für die nächste Idee genutzt.
  4. Sammle nach 10-15 Runden die stärksten Ideenketten und werte sie gemeinsam aus.

  **Tipp:** Vermeide jedes "Aber" oder "Nein" — selbst absurde Ergänzungen können zu
  Durchbrüchen führen. Der Schwung entsteht durch bedingungslose Akzeptanz.

  ### Brain Writing Round Robin

  **Anleitung:**
  1. Jeder Teilnehmer schreibt still drei Ideen auf ein Blatt (3 Minuten).
  2. Blätter werden im Uhrzeigersinn weitergereicht.
  3. Jeder liest die vorhandenen Ideen und fügt neue hinzu, die darauf aufbauen.
  4. Nach einer vollen Runde werden alle Blätter gesammelt und gemeinsam ausgewertet.

  **Tipp:** Diese Methode gibt introvertierten Teilnehmern gleich viel Raum wie
  extrovertierten. Die stille Phase verhindert Gruppendenken und fördert
  eigenständige Beiträge.

  ### Random Stimulation

  **Anleitung:**
  1. Wähle ein zufälliges Wort, Bild oder einen Gegenstand als Stimulus.
  2. Jeder Teilnehmer notiert Assoziationen zwischen dem Stimulus und dem Problem.
  3. Teilt eure unerwarteten Verbindungen in der Gruppe.
  4. Entwickelt die vielversprechendsten Verbindungen gemeinsam weiter.

  **Tipp:** Je weiter der Stimulus vom eigentlichen Thema entfernt ist, desto
  kreativer werden die Ergebnisse. Nutze Wörterbücher, Bilddatenbanken oder
  Alltagsgegenstände als Quelle.

  ### Role Playing

  **Anleitung:**
  1. Definiere 3-5 verschiedene Stakeholder-Perspektiven (z.B. Kunde, CEO, Kritiker).
  2. Jeder Teilnehmer übernimmt eine Rolle und argumentiert ausschliesslich aus dieser Sicht.
  3. Führt ein strukturiertes Gespräch über das Problem aus den verschiedenen Rollen.
  4. Wechselt die Rollen nach 10 Minuten und wiederholt die Diskussion.

  **Tipp:** Übertreibe die Rollen bewusst — ein überbesorgter Sicherheitsbeauftragter
  oder ein visionärer Träumer decken Aspekte auf, die in normalen Diskussionen
  untergehen.

  ### Ideation Relay Race

  **Anleitung:**
  1. Setze einen Timer auf 2 Minuten pro Runde.
  2. Der erste Teilnehmer generiert so viele Ideen wie möglich und gibt dann weiter.
  3. Der nächste baut auf den vorhandenen Ideen auf oder startet neue Stränge.
  4. Nach 4-5 Runden werden alle Ideen geclustert und die Top 5 ausgewählt.

  **Tipp:** Der Zeitdruck ist entscheidend — er überwindet den inneren Kritiker und
  fördert spontane, unzensierte Einfälle. Qualität kommt durch Quantität.
