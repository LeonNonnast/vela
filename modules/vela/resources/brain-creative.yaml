content: |
  # Kreative Brainstorming-Techniken

  ## Wann einsetzen

  Kreative Techniken sind ideal, wenn konventionelle Ansätze keine Fortschritte mehr bringen.
  Setze sie ein, wenn du festgefahrene Denkmuster aufbrechen, völlig neue Lösungsräume
  erschliessen oder innovative Konzepte entwickeln willst. Besonders wirkungsvoll bei
  Produktentwicklung, Strategiearbeit und Design-Challenges.

  ### What If Scenarios

  **Anleitung:**
  1. Formuliere radikale Was-wäre-wenn-Fragen zu deinem Problem.
  2. Entferne bewusst bestehende Einschränkungen (Budget, Zeit, Physik).
  3. Entwickle für jedes Szenario konkrete Lösungsansätze.
  4. Prüfe, welche Elemente sich in die Realität übertragen lassen.

  **Tipp:** Je unmöglicher die Frage, desto kreativer die Antworten. Frage z.B.
  "Was wenn wir unendlich Budget hätten?" oder "Was wenn das Problem gar nicht existiert?"

  ### Analogical Thinking

  **Anleitung:**
  1. Beschreibe dein Problem in einem Satz.
  2. Suche Parallelen in völlig anderen Domänen (Natur, Sport, Kunst, Medizin).
  3. Analysiere, wie das analoge Problem dort gelöst wurde.
  4. Übertrage die Lösungsprinzipien auf dein ursprüngliches Problem.

  **Tipp:** Die besten Analogien kommen aus weit entfernten Feldern — wie Ameisen
  Logistik betreiben oder wie Orchester sich koordinieren.

  ### Reversal Inversion

  **Anleitung:**
  1. Formuliere dein Ziel und kehre es um: "Wie machen wir es maximal schlecht?"
  2. Sammle ernsthaft Ideen für das Gegenteil des gewünschten Ergebnisses.
  3. Drehe jede schlechte Idee wieder um in einen positiven Ansatz.
  4. Priorisiere die umgekehrten Lösungen nach Machbarkeit.

  **Tipp:** Menschen sind oft besser darin, Probleme zu erzeugen als zu lösen —
  nutze das als Werkzeug.

  ### First Principles Thinking

  **Anleitung:**
  1. Zerlege das Problem in seine grundlegendsten Bestandteile.
  2. Hinterfrage jede Annahme: "Ist das wirklich wahr? Warum?"
  3. Baue die Lösung von Grund auf neu zusammen, nur aus verifizierten Fakten.
  4. Vergleiche deine Neukonstruktion mit dem bestehenden Ansatz.

  **Tipp:** Elon Musks Raketenbau ist das Paradebeispiel — statt "Raketen sind teuer"
  fragte er "Was kosten die Rohstoffe?". Hinterfrage Preise, Prozesse, Regeln.

  ### Forced Relationships

  **Anleitung:**
  1. Wähle zwei scheinbar unverbundene Konzepte (z.B. dein Produkt + ein Kochrezept).
  2. Liste Eigenschaften beider Konzepte auf.
  3. Erzwinge Verbindungen zwischen den Eigenschaftslisten.
  4. Entwickle aus den stärksten Verbindungen neue Ideen.

  **Tipp:** Die Unbehaglichkeit beim Verbinden ist gewollt — genau dort entstehen
  die innovativsten Einfälle.

  ### Time Shifting

  **Anleitung:**
  1. Versetze dein Problem in verschiedene Zeitepochen (Mittelalter, 2100, Steinzeit).
  2. Überlege, wie Menschen dieser Zeit das Problem angehen würden.
  3. Identifiziere zeitlose Prinzipien hinter den epochenspezifischen Lösungen.
  4. Wende diese Prinzipien auf die heutige Situation an.

  **Tipp:** Die Vergangenheit zeigt bewährte Muster, die Zukunft befreit von
  heutigen Limitierungen.

  ### Metaphor Mapping

  **Anleitung:**
  1. Wähle eine ausführliche Metapher für dein Problem (z.B. "Unser Projekt ist ein Schiff").
  2. Erweitere die Metapher systematisch: Wer ist der Kapitän? Wo sind die Lecks?
  3. Löse Probleme innerhalb der Metapher.
  4. Übersetze die metaphorischen Lösungen zurück in konkrete Maßnahmen.

  **Tipp:** Metaphern aktivieren andere Gehirnregionen und umgehen analytische Blockaden.

  ### Cross-Pollination

  **Anleitung:**
  1. Identifiziere 3-5 Branchen, die ein ähnliches Kernproblem gelöst haben.
  2. Recherchiere deren Lösungsansätze im Detail.
  3. Extrahiere die übertragbaren Prinzipien.
  4. Adaptiere die besten Ansätze für deinen Kontext.

  **Tipp:** Uber übertrug Logistik-Prinzipien auf Personentransport, Airbnb
  übertrug Hotel-Konzepte auf Privatwohnungen — branchenfremde Lösungen sind oft
  die stärksten.

  ### Concept Blending

  **Anleitung:**
  1. Wähle zwei bestehende Konzepte oder Produkte aus.
  2. Liste die Kerneigenschaften beider Konzepte auf.
  3. Kombiniere Eigenschaften systematisch zu neuen Hybridkonzepten.
  4. Bewerte die Hybride nach Neuheit und Machbarkeit.

  **Tipp:** Smartphone = Telefon + Computer + Kamera. Die besten Innovationen
  sind oft Verschmelzungen bestehender Ideen.

  ### Reverse Brainstorming

  **Anleitung:**
  1. Formuliere: "Wie können wir dieses Problem garantiert verschlimmern?"
  2. Sammle alle denkbaren Wege, das Ziel zu sabotieren.
  3. Kehre jeden Sabotagevorschlag in eine konstruktive Massnahme um.
  4. Priorisiere die umgekehrten Maßnahmen nach Wirksamkeit.

  **Tipp:** Besonders wirksam bei festgefahrenen Teams — Probleme erzeugen macht
  Spass und löst die kreative Blockade.

  ### Sensory Exploration

  **Anleitung:**
  1. Beschreibe dein Problem mit jedem der fünf Sinne: Wie sieht es aus, klingt es, fühlt es sich an?
  2. Suche für jeden Sinneskanal nach Lösungsansätzen.
  3. Kombiniere sensorische Einsichten zu ganzheitlichen Lösungen.
  4. Teste, welche sensorischen Zugänge die stärksten Ideen liefern.

  **Tipp:** Designer nutzen diese Technik, um Produkte zu schaffen, die auf
  mehreren Ebenen überzeugen — nicht nur funktional, sondern erlebbar.
