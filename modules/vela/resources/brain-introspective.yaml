  # Introspektive Brainstorming-Techniken

  ## Wann einsetzen
  Diese Techniken eignen sich besonders, wenn du tiefer in dich selbst hineinhorchen willst — bei persönlichen Entscheidungen, kreativen Blockaden oder wenn äußere Methoden nicht mehr weiterhelfen. Sie fördern Selbstreflexion und bringen verborgene Einsichten ans Licht.

  ### Inner Child Conference
  **Anleitung:**
  1. Versetze dich in die Perspektive deines kindlichen Ichs zurück.
  2. Stelle zu jedem Aspekt des Problems eine "Warum?"-Kette (mindestens 5x hintereinander).
  3. Lass spielerische, naive Ideen zu — ohne Filter oder Bewertung.

  **Tipp:** Kinder fragen ohne Scham. Erlaube dir dieselbe Freiheit.

  ### Shadow Work Mining
  **Anleitung:**
  1. Identifiziere, welche Aspekte des Problems du aktiv vermeidest oder ablehnst.
  2. Frage dich: Was würde passieren, wenn ich genau das Gegenteil meiner Intuition tue?
  3. Decke unbewusste Blockaden auf, indem du Widerstände als Wegweiser nutzt.

  **Tipp:** Der größte Widerstand zeigt oft die wertvollste Richtung an.

  ### Values Archaeology
  **Anleitung:**
  1. Grabe schichtweise tiefer: Was ist mir wichtig? Warum ist mir das wichtig? Was steckt dahinter?
  2. Kläre, welche Werte wirklich hinter deinen Präferenzen liegen.
  3. Prüfe, ob deine aktuelle Lösung mit diesen Kernwerten übereinstimmt.

  **Tipp:** Oft stehen Oberflächenwünsche im Widerspruch zu tieferen Werten.

  ### Future Self Interview
  **Anleitung:**
  1. Stelle dir dein Ich in 5, 10 oder 20 Jahren vor.
  2. Führe ein imaginäres Interview: Was würdest du mir raten? Was bereust du?
  3. Gewinne Langzeit-Perspektive für kurzfristige Entscheidungen.

  **Tipp:** Dein zukünftiges Ich hat den Luxus der Rückschau — nutze ihn jetzt.

  ### Body Wisdom Dialogue
  **Anleitung:**
  1. Nimm körperliche Empfindungen wahr, während du über das Problem nachdenkst.
  2. Frage dein Bauchgefühl: Wo spüre ich Spannung? Wo Leichtigkeit?
  3. Nutze diese Signale als Kompass für Ideen und Entscheidungen.

  **Tipp:** Der Körper reagiert oft schneller als der Verstand — höre ihm zu.

  ### Permission Giving
  **Anleitung:**
  1. Formuliere die kuenste, verrueckteste Lösung, die du dir vorstellen kannst.
  2. Erlaube dir explizit, unmögliche Dinge zu denken — ohne Selbstzensur.
  3. Brich selbstauferlegte Grenzen, indem du sagst: "Was wäre, wenn ich duerfte?"

  **Tipp:** Die meisten Grenzen existieren nur im Kopf. Erlaubnis ist der Schlüssel.
