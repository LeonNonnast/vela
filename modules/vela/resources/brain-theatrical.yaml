  # Theatralische Brainstorming-Techniken

  ## Wann einsetzen
  Diese Techniken eignen sich, wenn rationale Methoden nicht mehr greifen und du frische Perspektiven brauchst. Durch Rollenspiel und szenisches Denken umgehst du gewohnte Denkmuster und entdeckst Lösungen, die reine Analyse nicht liefern kann.

  ### Time Travel Talk Show
  **Anleitung:**
  1. Stelle dir eine Talkshow vor, in der vergangene und zukünftige Versionen von dir zu Gast sind.
  2. Interviewe dein jüngeres Ich: Was hättest du damals gebraucht? Was war dein größter Fehler?
  3. Interviewe dein älteres Ich: Welche Lösung hat sich bewährt? Was würdest du anders machen?

  **Tipp:** Lass die verschiedenen Versionen miteinander streiten — Konflikte erzeugen neue Ideen.

  ### Alien Anthropologist
  **Anleitung:**
  1. Betrachte dein Problem so, als wärst du ein Forscher von einem anderen Planeten.
  2. Stelle keine Annahmen voraus: Warum machen Menschen das so? Was ist der eigentliche Zweck?
  3. Dokumentiere alles, was dir als "Ausserirdischer" merkwürdig oder unlogisch vorkommt.

  **Tipp:** Das Vertraute fremd zu machen ist der schnellste Weg zu echten Durchbrüchen.

  ### Dream Fusion Laboratory
  **Anleitung:**
  1. Starte mit der absolut unmöglichsten Fantasielösung, die du dir vorstellen kannst.
  2. Arbeite dich rueckwaerts: Welcher vorletzte Schritt wäre nötig gewesen?
  3. Leite schrittweise praktikable Maßnahmen ab, bis du in der Realität ankommst.

  **Tipp:** Die verrueckteste Idee enthält oft den Kern der besten realistischen Lösung.

  ### Emotion Orchestra
  **Anleitung:**
  1. Wähle vier Emotionen: Wut, Freude, Angst und Hoffnung.
  2. Führe für jede Emotion eine separate Brainstorming-Runde durch.
  3. Lass die jeweilige Emotion die Richtung bestimmen: Was würde Wut vorschlagen? Was Freude?

  **Tipp:** Die besten Lösungen entstehen oft aus der unerwarteten Emotion — höre besonders auf Angst.

  ### Parallel Universe Cafe
  **Anleitung:**
  1. Definiere alternative Realitätsregeln: Was wäre, wenn Schwerkraft nicht existiert? Wenn Zeit rueckwaerts laeuft?
  2. Erkunde Lösungen innerhalb dieser veränderten Regeln.
  3. Extrahiere die Prinzipien, die auch in der echten Welt anwendbar sind.

  **Tipp:** Jede "unmöglich" Regel enthält eine versteckte Annahme, die du hinterfragen solltest.

  ### Persona Journey
  **Anleitung:**
  1. Wähle verschiedene Archetypen: der Weise, der Rebell, der Schützer, das Kind.
  2. Verkörpere jeden Archetyp nacheinander und betrachte das Problem aus seiner Sicht.
  3. Sammle die diverse Weisheit jeder Perspektive.

  **Tipp:** Der Archetyp, der dir am fernsten liegt, liefert oft die wertvollste Einsicht.
