[project]
name = "vela-sdk"
version = "0.1.0"
description = "Workflow engine SDK for FastMCP servers — add structured, multi-step workflows to any MCP server"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Arineo GmbH" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Framework :: Pydantic :: 2",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "structlog>=23.2.0",
]

[project.urls]
Homepage = "https://github.com/Arineo-AI/vela"
Repository = "https://github.com/Arineo-AI/vela"
Documentation = "https://github.com/Arineo-AI/vela/tree/main/packages/vela-sdk"

[project.optional-dependencies]
sqlalchemy = ["sqlalchemy[asyncio]>=2.0", "aiosqlite>=0.21.0"]
fastmcp = ["fastmcp>=3.0.0b1"]
all = ["vela-sdk[sqlalchemy,fastmcp]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vela_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "fastmcp>=3.0.0b1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
